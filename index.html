<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.openai.com https://lingva.ml https://raw.githubusercontent.com https://objects.githubusercontent.com https://release-assets.githubusercontent.com; media-src 'self' blob: data: https://objects.githubusercontent.com https://release-assets.githubusercontent.com; frame-src 'self' blob: data:; object-src 'self' blob: data:;" />
    <script>
      (function() {
        try {
          var state = localStorage.getItem('lingo-user-prefs');
          if (state) {
            var parsed = JSON.parse(state);
            var theme = parsed.state?.theme || 'light';
            var track = parsed.state?.activeTrack || 'english';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('data-track', track);
          }
        } catch (e) {}
      })();
    </script>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#58cc02" />
    <meta name="description" content="Lingomaster Ultimate - a gamified web app for learning TOEIC English and JLPT N2 Japanese with flashcards, quizzes, listening, speaking and dictation." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    <title>Lingomaster Ultimate</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
